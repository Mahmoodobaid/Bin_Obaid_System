name: بناء تطبيق بن عبيد (مع تصحيح المسار)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: إعادة إنشاء android
        run: |
          cd frontend
          rm -rf android
          flutter create --platforms=android .
          flutter pub get

      - name: بناء APK
        run: |
          cd frontend
          flutter build apk --debug

      - name: البحث عن ملف APK المُنتَج
        run: |
          echo "=== البحث عن ملفات APK ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== محتويات مجلد build ==="
          ls -la frontend/build/ || echo "لا يوجد مجلد build"
          ls -la frontend/build/app/outputs/ || echo "لا يوجد مجلد outputs"
          ls -la frontend/build/app/outputs/flutter-apk/ || echo "لا يوجد مجلد flutter-apk"

      - name: رفع أي ملف APK موجود
        uses: actions/upload-artifact@v4
        with:
          name: تطبيق-بن-عبيد
          path: |
            frontend/build/app/outputs/flutter-apk/*.apk
            frontend/build/app/outputs/apk/debug/*.apk
            **/build/**/*.apk
