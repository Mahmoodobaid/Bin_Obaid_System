name: تشخيص خطأ البناء

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - name: محاولة بناء مع logging كامل
        run: |
          cd frontend
          flutter pub get
          flutter build apk --debug --verbose 2>&1 | tee build_log.txt
          # إذا فشل، نعرض آخر 200 سطر
          if [ $? -ne 0 ]; then
            echo "===== FAILED, LAST 200 LINES ====="
            tail -n 200 build_log.txt
            exit 1
          fi
      - name: رفع سجل البناء
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: frontend/build_log.txt
