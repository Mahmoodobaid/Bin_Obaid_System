name: بناء APK لمشروع بن عبيد (V2 Embedding)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: إنشاء مشروع جديد ونسخ الكود
        run: |
          # إنشاء مشروع نظيف مؤقت
          flutter create --platforms=android --org com.binobaid temp_app
          cd temp_app
          
          # حذف lib و pubspec.yaml الأصليين
          rm -rf lib pubspec.yaml
          
          # نسخ ملفات المشروع الحقيقي من frontend
          cp -r ../frontend/lib .
          cp ../frontend/pubspec.yaml .
          
          # إذا وجدت مجلد assets, images, fonts انسخها
          if [ -d "../frontend/assets" ]; then cp -r ../frontend/assets .; fi
          if [ -d "../frontend/images" ]; then cp -r ../frontend/images .; fi
          if [ -d "../frontend/fonts" ]; then cp -r ../frontend/fonts .; fi
          
          # تثبيت التبعيات
          flutter pub get

      - name: بناء APK
        run: |
          cd temp_app
          flutter build apk --debug

      - name: رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: تطبيق-بن-عبيد
          path: temp_app/build/app/outputs/flutter-apk/app-debug.apk          name: build-log
          path: frontend/build_log.txt
