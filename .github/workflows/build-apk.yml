name: بناء تطبيق بن عبيد (إنشاء جديد)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: إنشاء مشروع Flutter جديد ونسخ المصادر
        run: |
          # إنشاء مشروع جديد
          flutter create --platforms=android --org com.binobaid temp_project
          cd temp_project
          
          # حذف lib و pubspec.yaml الأصليين
          rm -rf lib pubspec.yaml
          
          # نسخ مصادر المشروع الحقيقي من frontend
          cp -r ../frontend/lib .
          cp ../frontend/pubspec.yaml .
          
          # نسخ مجلد assets إذا كان موجوداً
          if [ -d "../frontend/assets" ]; then cp -r ../frontend/assets .; fi
          if [ -d "../frontend/images" ]; then cp -r ../frontend/images .; fi
          
          # تثبيت التبعيات
          flutter pub get

      - name: بناء APK
        run: |
          cd temp_project
          flutter build apk --debug

      - name: رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: تطبيق-بن-عبيد
          path: temp_project/build/app/outputs/flutter-apk/app-debug.apk
