name: bin_obeid_customer
description: تطبيق عملاء منظومة بن عبيد لإدارة المخازن وعروض الأسعار
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  local_auth: ^2.1.6
  flutter:
    sdk: flutter
  
  # UI والمكونات
  cupertino_icons: ^1.0.6
  
  # إدارة الحالة والتخزين المحلي
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # الشبكة والـ API
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  
  # الصور والكاش
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.3.0
  image_picker: ^1.0.5
  
  # الإشعارات
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0
  
  # التحديث التلقائي
  path_provider: ^2.1.1
  open_file: ^3.3.2
  permission_handler: ^11.0.1
  
  # الأدوات
  carousel_slider: ^4.2.1
  flutter_spinkit: ^5.2.0
  intl: ^0.18.1
  url_launcher: ^6.2.1

dev_dependencies:
  local_auth: ^2.1.6
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  # يمكن تفعيل الخط بإزالة علامات التعليق بعد تحميل الخط
  # fonts:
  #   - family: Cairo
  #     fonts:
  #       - asset: assets/fonts/Cairo-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Cairo-Bold.ttf
  #         weight: 700