<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>دخول المسؤول - بن عبيد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', 'Tahoma', sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { max-width: 450px; width: 100%; margin: 20px; }
        .login-card { background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden; }
        .login-header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; text-align: center; padding: 30px; }
        .login-body { padding: 30px; }
        .form-control { border-radius: 10px; padding: 12px 15px; }
        .btn-login { background: linear-gradient(135deg, #1e3c72, #2a5298); border: none; border-radius: 10px; padding: 12px; font-weight: bold; color: white; width: 100%; }
        .password-toggle { cursor: pointer; position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #6c757d; }
        .input-group { position: relative; }
        .input-group .form-control { padding-left: 40px; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header"><i class="fas fa-store fa-3x"></i><h3>بن عبيد للتجارة</h3><p>نظام إدارة المخازن وعروض الأسعار</p></div>
        <div class="login-body">
            <div id="alertMessage" style="display: none;" class="alert alert-danger"><span id="alertText"></span></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label id="loginLabel">رقم الهاتف</label>
                    <div class="input-group">
                        <span class="input-group-text"><i id="loginIcon" class="fas fa-phone"></i></span>
                        <input type="tel" id="loginIdentifier" class="form-control" placeholder="770491653" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label>كلمة المرور</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword()"></i>
                    </div>
                </div>
                <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> دخول</button>
            </form>
            <div class="mt-3 text-center"><small><a href="#" id="toggleMethodLink">تسجيل الدخول بالبريد الإلكتروني</a></small></div>
        </div>
        <div class="footer text-center p-3 bg-light small text-muted"><i class="fas fa-shield-alt"></i> نظام آمن وحماية عالية</div>
    </div>
</div>
<script>
    let usePhone = true;
    function togglePassword() {
        const pwd = document.getElementById('password');
        const icon = document.querySelector('.password-toggle');
        if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); }
        else { pwd.type = 'password'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); }
    }
    function toggleLoginMethod() {
        const label = document.getElementById('loginLabel');
        const input = document.getElementById('loginIdentifier');
        const icon = document.getElementById('loginIcon');
        const link = document.getElementById('toggleMethodLink');
        if (usePhone) {
            label.innerText = 'البريد الإلكتروني';
            input.type = 'email';
            input.placeholder = 'admin@example.com';
            icon.className = 'fas fa-envelope';
            link.innerText = 'تسجيل الدخول برقم الهاتف';
            usePhone = false;
        } else {
            label.innerText = 'رقم الهاتف';
            input.type = 'tel';
            input.placeholder = '770491653';
            icon.className = 'fas fa-phone';
            link.innerText = 'تسجيل الدخول بالبريد الإلكتروني';
            usePhone = true;
        }
        input.value = '';
    }
    async function loginAdmin(identifier, password, isPhone) {
        const endpoint = isPhone ? '/api/auth/login-with-phone' : '/api/auth/login';
        const body = isPhone ? { phone: identifier, password } : { email: identifier, password };
        const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await res.json();
        if (res.ok && data.user && data.user.role === 'admin') { localStorage.setItem('admin_token', data.access_token); return true; }
        return false;
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const identifier = document.getElementById('loginIdentifier').value.trim();
        const password = document.getElementById('password').value;
        const alertDiv = document.getElementById('alertMessage');
        alertDiv.style.display = 'none';
        const btn = document.querySelector('.btn-login');
        const original = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';
        btn.disabled = true;
        try {
            const success = await loginAdmin(identifier, password, usePhone);
            if (success) window.location.href = 'dashboard.html';
            else { document.getElementById('alertText').innerText = 'رقم الهاتف/البريد أو كلمة المرور غير صحيحة'; alertDiv.style.display = 'block'; btn.innerHTML = original; btn.disabled = false; }
        } catch (error) { document.getElementById('alertText').innerText = 'حدث خطأ في الاتصال بالخادم'; alertDiv.style.display = 'block'; btn.innerHTML = original; btn.disabled = false; }
    });
    window.onload = async () => {
        const token = localStorage.getItem('admin_token');
        if (token) {
            try { const res = await fetch('/api/admin/check', { headers: { 'Authorization': `Bearer ${token}` } }); if (res.ok) window.location.href = 'dashboard.html'; else localStorage.removeItem('admin_token'); }
            catch(e) { localStorage.removeItem('admin_token'); }
        }
    };
    document.getElementById('toggleMethodLink').onclick = (e) => { e.preventDefault(); toggleLoginMethod(); };
</script>
</body>
</html>
