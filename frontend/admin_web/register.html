<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>إنشاء حساب جديد - بن عبيد التجارية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #0f2b3d 0%, #1b4f6e 100%); min-height: 100vh; padding: 40px 20px; display: flex; align-items: center; justify-content: center; }
        .register-card { max-width: 550px; width: 100%; background: #ffffff; border-radius: 32px; box-shadow: 0 20px 35px rgba(0,0,0,0.2); overflow: hidden; }
        .register-header { background: linear-gradient(120deg, #1e5a7a, #0f3b4f); padding: 25px 20px; text-align: center; color: white; }
        .register-header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
        .register-header p { font-size: 0.9rem; opacity: 0.85; }
        .register-body { padding: 25px 30px 30px; }
        .avatar-upload { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
        .avatar-preview { width: 100px; height: 100px; border-radius: 50%; background: #f1f5f9; display: flex; align-items: center; justify-content: center; border: 2px dashed #2c7da0; cursor: pointer; overflow: hidden; transition: 0.2s; margin-bottom: 8px; }
        .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-preview i { font-size: 40px; color: #94a3b8; }
        .avatar-label { color: #2c7da0; font-weight: 500; cursor: pointer; font-size: 0.9rem; }
        .input-group-custom { position: relative; margin-bottom: 20px; }
        .input-group-custom i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 1.1rem; }
        .input-group-custom input, .input-group-custom textarea { width: 100%; padding: 12px 45px 12px 15px; border: 1px solid #e2e8f0; border-radius: 30px; font-size: 0.95rem; transition: 0.2s; background: #f8fafc; }
        .input-group-custom textarea { border-radius: 20px; resize: vertical; }
        .input-group-custom input:focus, .input-group-custom textarea:focus { outline: none; border-color: #2c7da0; box-shadow: 0 0 0 3px rgba(44,125,160,0.2); background: white; }
        .btn-register { background: linear-gradient(95deg, #2c7da0, #1f5e7a); border: none; border-radius: 40px; padding: 12px; font-size: 1rem; font-weight: 700; width: 100%; color: white; margin: 10px 0 15px; }
        .login-link { text-align: center; margin-top: 10px; }
        .login-link a { color: #2c7da0; text-decoration: none; font-weight: 600; }
        .alert-custom { border-radius: 30px; margin-bottom: 20px; }
        .footer-note { text-align: center; font-size: 0.7rem; color: #94a3b8; margin-top: 20px; }
        @media (max-width: 480px) { .register-body { padding: 20px; } }
    </style>
</head>
<body>
<div class="register-card">
    <div class="register-header"><h1>إنشاء حساب جديد</h1><p>أهلاً بك في منصة بن عبيد التجارية</p></div>
    <div class="register-body">
        <div id="alertMessage" class="alert alert-danger alert-custom" style="display: none;"></div>
        <div id="successMessage" class="alert alert-success alert-custom" style="display: none;"></div>
        <form id="registerForm">
            <div class="avatar-upload">
                <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('imageInput').click()"><i class="fas fa-plus-circle"></i></div>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                <span class="avatar-label">صورة العميل</span>
            </div>
            <div class="input-group-custom"><i class="fas fa-phone-alt"></i><input type="tel" id="phone" placeholder="رقم الموبيل" required pattern="[0-9]{9}" maxlength="9"><small class="text-muted" style="display: block; margin-right: 15px;">مثال: 770491653 (9 أرقام)</small></div>
            <div class="input-group-custom"><i class="fas fa-user"></i><input type="text" id="fullName" placeholder="اسم العميل" required></div>
            <div class="input-group-custom"><i class="fas fa-briefcase"></i><input type="text" id="occupation" placeholder="مهنة العميل"></div>
            <div class="input-group-custom"><i class="fas fa-map-marker-alt"></i><textarea id="address" rows="2" placeholder="عنوان العميل"></textarea></div>
            <button type="submit" class="btn btn-register" id="submitBtn"><i class="fas fa-user-plus me-2"></i> إنشاء حساب</button>
        </form>
        <div class="login-link"><span>لديك حساب بالفعل؟ </span><a href="index.html">تسجيل الدخول</a></div>
        <div class="footer-note"><i class="fas fa-shield-alt"></i> بيئة آمنة ومحمية</div>
    </div>
</div>
<script>
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) { document.getElementById('avatarPreview').innerHTML = `<img src="${event.target.result}" alt="صورة العميل">`; };
            reader.readAsDataURL(file);
        }
    });
    async function checkUserExists(phone) {
        try {
            const response = await fetch(`/api/users/check?phone=${encodeURIComponent(phone)}`);
            const data = await response.json();
            return data.exists;
        } catch(err) { return false; }
    }
    async function uploadImage(file) {
        return new Promise((resolve) => { if (!file) resolve(null); const reader = new FileReader(); reader.onload = (e) => resolve(e.target.result); reader.readAsDataURL(file); });
    }
    async function submitRegistration(data) {
        const response = await fetch('/api/auth/register-request', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        return response.json();
    }
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertDiv = document.getElementById('alertMessage'), successDiv = document.getElementById('successMessage');
        alertDiv.style.display = 'none'; successDiv.style.display = 'none';
        const phone = document.getElementById('phone').value.trim();
        const fullName = document.getElementById('fullName').value.trim();
        const occupation = document.getElementById('occupation').value.trim();
        const address = document.getElementById('address').value.trim();
        const imageFile = document.getElementById('imageInput').files[0];
        if (!phone || !fullName) { showAlert('يرجى إدخال رقم الهاتف والاسم الكامل'); return; }
        if (!/^\d{9}$/.test(phone)) { showAlert('رقم الهاتف يجب أن يكون 9 أرقام'); return; }
        const exists = await checkUserExists(phone);
        if (exists) { showAlert('هذا الحساب موجود مسبقاً. يرجى تسجيل الدخول أو استخدام رقم آخر.'); return; }
        let imageBase64 = null;
        if (imageFile) imageBase64 = await uploadImage(imageFile);
        const submitBtn = document.getElementById('submitBtn');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
        submitBtn.disabled = true;
        try {
            const result = await submitRegistration({ phone, full_name: fullName, occupation, address, image_url: imageBase64 });
            if (result.success) {
                successDiv.innerText = '✅ تم حفظ بياناتك بنجاح. سيتم مراجعة طلبك وإعلامك عبر رسالة نصية عند الموافقة. شكراً لتسجيلك في بن عبيد التجارية.';
                successDiv.style.display = 'block';
                document.getElementById('registerForm').reset();
                document.getElementById('avatarPreview').innerHTML = '<i class="fas fa-plus-circle"></i>';
            } else { showAlert(result.error || 'حدث خطأ أثناء إرسال الطلب'); }
        } catch(err) { console.error(err); showAlert('حدث خطأ في الاتصال بالخادم'); }
        finally { submitBtn.innerHTML = originalText; submitBtn.disabled = false; }
    });
    function showAlert(msg) { const alertDiv = document.getElementById('alertMessage'); alertDiv.innerText = msg; alertDiv.style.display = 'block'; setTimeout(() => { alertDiv.style.display = 'none'; }, 5000); }
</script>
</body>
</html>
